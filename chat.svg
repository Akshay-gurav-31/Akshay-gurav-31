```svg
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="250" viewBox="0 0 500 250">

<style>
.bubble{
fill:white;
stroke:#e5e7eb;
stroke-width:1.2;
}

.text{
fill:#111827;
font-size:16px;
font-family:Arial,sans-serif;
}

.name{
fill:#ef4444;
font-weight:bold;
}

.msg1{
animation:show 0.4s forwards;
}

.msg2{
opacity:0;
animation:show 0.4s 2s forwards;
}

.msg3{
opacity:0;
animation:show 0.4s 4s forwards;
}

.typing1{
opacity:0;
animation:typing 1.2s 0.7s;
}

.typing2{
opacity:0;
animation:typing 1.2s 2.7s;
}

@keyframes typing{
0%,100%{opacity:0;}
30%,80%{opacity:1;}
}

@keyframes show{
from{
opacity:0;
transform:translateY(5px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

<rect width="100%" height="100%" fill="white"/>

<g class="msg1">
<rect class="bubble" x="10" y="10" rx="16" width="220" height="38"/>
<text class="text" x="24" y="34">Hi, I'm </text>
<text class="text name" x="88" y="34">Akshay 👋</text>
</g>

<g class="typing1">
<rect class="bubble" x="10" y="58" rx="16" width="70" height="34"/>
<text class="text" x="30" y="80">•••</text>
</g>

<g class="msg2">
<rect class="bubble" x="10" y="58" rx="16" width="320" height="38"/>
<text class="text" x="24" y="82">
AI/ML Engineer & Data Science
</text>
</g>

<g class="typing2">
<rect class="bubble" x="10" y="106" rx="16" width="70" height="34"/>
<text class="text" x="30" y="128">•••</text>
</g>

<g class="msg3">
<rect class="bubble" x="10" y="106" rx="16" width="320" height="38"/>
<text class="text" x="24" y="130">
Deep Learning • LLMs 🚀
</text>
</g>

</svg>
```
