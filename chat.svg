<svg width="500" height="250" viewBox="0 0 500 250" fill="none" xmlns="http://www.w3.org/2000/svg">

<style>
.bubble{
fill:#ffffff;
stroke:#e5e7eb;
stroke-width:1.2;
}

text{
fill:#111827;
font-size:16px;
font-family:'Segoe UI',sans-serif;
}

.name{
fill:#ef4444;
font-weight:700;
}

.msg1{
animation:msg1 0.3s forwards;
}

.msg2{
opacity:0;
animation:wait2 2s,msg2 0.3s 2s forwards;
}

.msg3{
opacity:0;
animation:wait3 4s,msg3 0.3s 4s forwards;
}

.msg4{
opacity:0;
animation:wait4 6s,msg4 0.3s 6s forwards;
}

.typing1{
opacity:0;
animation:typing1 1.5s 0.5s;
}

.typing2{
opacity:0;
animation:typing2 1.5s 2.5s;
}

.typing3{
opacity:0;
animation:typing3 1.5s 4.5s;
}

@keyframes typing1{
0%,100%{opacity:0;}
30%,80%{opacity:1;}
}

@keyframes typing2{
0%,100%{opacity:0;}
30%,80%{opacity:1;}
}

@keyframes typing3{
0%,100%{opacity:0;}
30%,80%{opacity:1;}
}

@keyframes wait2{
0%,100%{opacity:0;}
}

@keyframes wait3{
0%,100%{opacity:0;}
}

@keyframes wait4{
0%,100%{opacity:0;}
}

@keyframes msg1{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes msg2{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes msg3{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes msg4{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}
</style>

<rect width="100%" height="100%" fill="#ffffff"/>

<g class="msg1">
<rect class="bubble" x="10" y="10" rx="16" width="220" height="36"/>
<text x="24" y="33">Hi, I'm </text>
<text x="88" y="33" class="name">Akshay 👋</text>
</g>

<g class="typing1">
<rect class="bubble" x="10" y="52" rx="16" width="70" height="34"/>
<text x="28" y="74">•••</text>
</g>

<g class="msg2">
<rect class="bubble" x="10" y="52" rx="16" width="320" height="36"/>
<text x="24" y="75">AI/ML Engineer & Data Science</text>
</g>

<g class="typing2">
<rect class="bubble" x="10" y="94" rx="16" width="70" height="34"/>
<text x="28" y="116">•••</text>
</g>

<g class="msg3">
<rect class="bubble" x="10" y="94" rx="16" width="290" height="36"/>
<text x="24" y="117">Deep Learning • LLMs</text>
</g>

<g class="typing3">
<rect class="bubble" x="10" y="136" rx="16" width="70" height="34"/>
<text x="28" y="158">•••</text>
</g>

<g class="msg4">
<rect class="bubble" x="10" y="136" rx="16" width="360" height="36"/>
<text x="24" y="159">Building intelligent systems 🚀</text>
</g>

</svg>
