<svg fill="none" viewBox="0 0 700 220" width="700" height="220" xmlns="http://www.w3.org/2000/svg">

<style>
.bubble1 {
  animation: float1 3s ease-in-out infinite;
}
.bubble2 {
  animation: float2 3.5s ease-in-out infinite;
}
.bubble3 {
  animation: float3 4s ease-in-out infinite;
}
.text {
  font: 600 20px 'Segoe UI', sans-serif;
  fill: #111827;
}
.small {
  font: 500 18px 'Segoe UI', sans-serif;
  fill: #1f2937;
}
@keyframes float1 {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-6px);}
  100% { transform: translateY(0px);}
}
@keyframes float2 {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-8px);}
  100% { transform: translateY(0px);}
}
@keyframes float3 {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-5px);}
  100% { transform: translateY(0px);}
}
</style>

<rect width="100%" height="100%" fill="#ffffff"/>

<text x="25" y="40" font-size="30" fill="#2563eb" font-family="Segoe UI" font-weight="700">
Hi there 👋
</text>

<g class="bubble1">
  <rect x="25" y="60" rx="20" ry="20" width="220" height="45" fill="#e5e7eb"/>
  <text class="text" x="42" y="88">Hi, I'm Akshay</text>
</g>

<g class="bubble2">
  <rect x="25" y="120" rx="20" ry="20" width="430" height="50" fill="#e5e7eb"/>
  <text class="small" x="42" y="152">
AI/ML Engineer • Data Science Enthusiast
  </text>
</g>

<g class="bubble3">
  <rect x="25" y="185" rx="20" ry="20" width="520" height="50" fill="#e5e7eb"/>
  <text class="small" x="42" y="217">
Deep Learning • LLMs • Analytics • Problem Solving
  </text>
</g>

</svg>
